user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;

    # 后端 gateway，docker-compose 内 service 名为 gateway
    upstream campus_gateway {
        server gateway:8080;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 16M;

        # 静态资源
        root /usr/share/nginx/html;
        index index.html;

        # /api 反代到 Spring Cloud Gateway
        # 注意：proxy_pass 末尾不能加 "/"，否则 Nginx 会剥掉 /api 前缀，
        # 导致 Gateway 路由断言 Path=/api/**/** 匹配不到，出现 404。
        location /api/ {
            proxy_pass http://campus_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 5s;
        }

        # Knife4j 聚合文档（仅内网/管理员）
        location /doc.html {
            proxy_pass http://campus_gateway/doc.html;
            proxy_set_header Host $host;
        }
        location /v3/api-docs {
            proxy_pass http://campus_gateway/v3/api-docs;
            proxy_set_header Host $host;
        }
        location /webjars/ {
            proxy_pass http://campus_gateway/webjars/;
            proxy_set_header Host $host;
        }

        # Vue SPA history 模式
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 资源缓存
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS：把下面 server 块的注释打开，并按 README.md 用 certbot 申请证书
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name campus.example.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/campus.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/campus.example.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # 其余 location 复用上面 server 块；可直接 include 一个 snippet 文件
    # }
