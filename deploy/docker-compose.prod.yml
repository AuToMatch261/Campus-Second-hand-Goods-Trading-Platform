# 生产编排：单机 docker compose。
# 用法：
#   1) 复制 .env.example -> .env 并填实际密码 / 域名
#   2) ./deploy.sh （或 docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build）
#
# 所有 service 都接到内部网络 campus-net；只有 nginx-frontend 暴露 80/443 给外部。
# 中间件管理端口默认 bind 127.0.0.1，需要远端访问请改成 0.0.0.0 或上跳板机。
name: campus-prod

x-app-common: &app-common
  restart: unless-stopped
  networks: [campus-net]
  environment:
    TZ: Asia/Shanghai
    NACOS_SERVER: nacos:8848
    NACOS_USERNAME: ${NACOS_USERNAME}
    NACOS_PASSWORD: ${NACOS_PASSWORD}
    NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
    RABBITMQ_HOST: rabbitmq
    RABBITMQ_PORT: 5672
    RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
    RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    SPRING_PROFILES_ACTIVE: prod

services:

  # ----------------------------------------------------------------
  # 中间件
  # ----------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --lower_case_table_names=1
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docker/data/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks: [campus-net]

  redis:
    image: redis:7.2
    container_name: campus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [campus-net]

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: campus-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_VALUE}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      JVM_XMS: 512m
      JVM_XMX: 512m
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-logs:/home/nacos/logs
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [campus-net]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: campus-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks: [campus-net]

  elasticsearch:
    build:
      context: ../docker/elasticsearch
      args:
        IK_VERSION: 8.13.4
    image: campus-elasticsearch:8.13.4-ik
    container_name: campus-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms${ES_HEAP:-512m} -Xmx${ES_HEAP:-512m}"
      xpack.security.enabled: "false"
      bootstrap.memory_lock: "false"
      TZ: Asia/Shanghai
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - es-logs:/usr/share/elasticsearch/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks: [campus-net]

  # ----------------------------------------------------------------
  # 业务服务（按依赖顺序）
  # ----------------------------------------------------------------
  gateway:
    <<: *app-common
    image: campus/gateway:${APP_VERSION:-latest}
    container_name: campus-gateway
    build:
      context: ../backend
      args:
        SERVICE_NAME: gateway
    depends_on:
      nacos: { condition: service_healthy }

  auth-service:
    <<: *app-common
    image: campus/auth-service:${APP_VERSION:-latest}
    container_name: campus-auth
    build:
      context: ../backend
      args:
        SERVICE_NAME: auth-service
    depends_on:
      nacos:   { condition: service_healthy }
      mysql:   { condition: service_healthy }
      redis:   { condition: service_healthy }

  user-service:
    <<: *app-common
    image: campus/user-service:${APP_VERSION:-latest}
    container_name: campus-user
    build:
      context: ../backend
      args:
        SERVICE_NAME: user-service
    depends_on:
      nacos:   { condition: service_healthy }
      mysql:   { condition: service_healthy }
      redis:   { condition: service_healthy }

  product-service:
    <<: *app-common
    image: campus/product-service:${APP_VERSION:-latest}
    container_name: campus-product
    environment:
      TZ: Asia/Shanghai
      NACOS_SERVER: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      ES_URIS: http://elasticsearch:9200
      # 阿里云 OSS:AK/SK 走 .env 注入,不要硬编码
      ALIYUN_OSS_ENABLED: ${ALIYUN_OSS_ENABLED:-false}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-https://oss-cn-beijing.aliyuncs.com}
      ALIYUN_OSS_BUCKET: ${ALIYUN_OSS_BUCKET:-}
      ALIYUN_OSS_AK: ${ALIYUN_OSS_AK:-}
      ALIYUN_OSS_SECRET: ${ALIYUN_OSS_SECRET:-}
      ALIYUN_OSS_DOMAIN: ${ALIYUN_OSS_DOMAIN:-}
    build:
      context: ../backend
      args:
        SERVICE_NAME: product-service
    depends_on:
      nacos:         { condition: service_healthy }
      mysql:         { condition: service_healthy }
      redis:         { condition: service_healthy }
      rabbitmq:      { condition: service_healthy }
      elasticsearch: { condition: service_healthy }

  order-service:
    <<: *app-common
    image: campus/order-service:${APP_VERSION:-latest}
    container_name: campus-order
    build:
      context: ../backend
      args:
        SERVICE_NAME: order-service
    depends_on:
      nacos:    { condition: service_healthy }
      mysql:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  message-service:
    <<: *app-common
    image: campus/message-service:${APP_VERSION:-latest}
    container_name: campus-message
    build:
      context: ../backend
      args:
        SERVICE_NAME: message-service
    depends_on:
      nacos:    { condition: service_healthy }
      mysql:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  # ----------------------------------------------------------------
  # 前端 + nginx 反代
  # ----------------------------------------------------------------
  frontend:
    image: campus/frontend:${APP_VERSION:-latest}
    container_name: campus-frontend
    restart: unless-stopped
    build:
      context: ../frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      # HTTPS：开启证书后再开 443
      # - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # HTTPS：把证书目录挂进来
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gateway
    networks: [campus-net]

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  rabbitmq-data:
  es-data:
  es-logs:

networks:
  campus-net:
    name: campus-prod-net
    driver: bridge
