server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import:
      - optional:nacos:application-shared.yaml?group=CAMPUS_GROUP&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: CAMPUS_GROUP
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: CAMPUS_GROUP
        file-extension: yaml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
