server:
  port: 8083

spring:
  application:
    name: product-service
  config:
    import:
      - optional:nacos:application-shared.yaml?group=CAMPUS_GROUP&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: CAMPUS_GROUP
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: CAMPUS_GROUP
        file-extension: yaml
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:campus}
    password: ${RABBITMQ_PASSWORD:campus123}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 2s
          max-attempts: 5
          multiplier: 2
          max-interval: 30s
  elasticsearch:
    uris: ${ES_URIS:http://127.0.0.1:9200}
    connection-timeout: 5s
    socket-timeout: 10s
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

campus:
  search:
    products-index: ${ES_PRODUCTS_INDEX:products}
  oss:
    # AK/Secret 必须通过环境变量传入,严禁写死或提交到 git
    enabled: ${ALIYUN_OSS_ENABLED:false}
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_AK:}
    access-key-secret: ${ALIYUN_OSS_SECRET:}
    bucket: ${ALIYUN_OSS_BUCKET:sky-itcast12581}
    # 自定义 CDN/HTTPS 域名时填这里,例如 https://img.campus.example.com
    custom-domain: ${ALIYUN_OSS_DOMAIN:}
    max-file-size: 10485760  # 10 MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
